name: Docs Sync → cosmos/example

# Runs when example tutorial .mdx files change on main.
# Transforms .mdx → .md and opens a PR on the example repo.
# If a sync PR is already open, updates it instead of opening a new one.
# Skip if the commit was itself produced by the sync (loop guard).

on:
  push:
    branches:
      - main
    paths:
      - "sdk/next/tutorials/example/**"

jobs:
  sync:
    name: Sync example tutorials to cosmos/example
    runs-on: ubuntu-latest
    # Loop guard: skip commits that the docs-sync bot created
    if: "!contains(github.event.head_commit.message, '[docs-sync]')"

    steps:
      - name: Checkout cosmos/docs
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Checkout cosmos/example
        uses: actions/checkout@v4
        with:
          repository: cosmos/example
          # Fine-grained PAT with contents:write and pull-requests:write on cosmos/example
          token: ${{ secrets.EXAMPLE_REPO_TOKEN }}
          path: cosmos-example

      - name: Transform Mintlify → example repo format
        run: |
          python3 scripts/docs-sync/transform.py \
            --direction to-example \
            --input sdk/next/tutorials/example/ \
            --output-dir cosmos-example/docs/

      - name: Check for changes
        id: diff
        run: |
          cd cosmos-example
          [ -n "$(git status --porcelain docs/)" ] \
            && echo "changed=true" >> "$GITHUB_OUTPUT" \
            || echo "changed=false" >> "$GITHUB_OUTPUT"

      - name: Open or update PR on cosmos/example
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.EXAMPLE_REPO_TOKEN }}
        run: |
          cd cosmos-example

          git config user.name  "docs-sync[bot]"
          git config user.email "docs-sync[bot]@users.noreply.github.com"

          # Check for an existing open sync PR
          EXISTING=$(gh pr list \
            --repo cosmos/example \
            --label "docs-sync" \
            --state open \
            --json number,headRefName \
            --jq '.[0]')

          if [ -n "$EXISTING" ]; then
            PR_NUMBER=$(echo "$EXISTING" | jq -r '.number')
            BRANCH=$(echo "$EXISTING" | jq -r '.headRefName')

            # Update the existing branch
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git add docs/
            git commit -m "docs: sync example tutorials from cosmos/docs [docs-sync]"
            git push origin "$BRANCH"

            gh pr comment "$PR_NUMBER" \
              --repo cosmos/example \
              --body "$(cat <<'EOF'
## Sync updated

A new commit was pushed to **cosmos/docs** before this PR was merged. This PR's branch has been updated with the latest changes.

**New commit:** ${{ github.sha }}
**Triggered by:** ${{ github.event.head_commit.message }}

Please re-review the diff before merging.

🤖 docs-sync bot
EOF
)"
            echo "Updated existing PR #$PR_NUMBER"

          else
            # No existing PR — create a new branch and open one
            BRANCH="docs-sync/from-docs-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git add docs/
            git commit -m "docs: sync example tutorials from cosmos/docs [docs-sync]"
            git push origin "$BRANCH"

            gh pr create \
              --repo cosmos/example \
              --head "$BRANCH" \
              --base main \
              --title "docs: sync example tutorials from cosmos/docs" \
              --label "docs-sync" \
              --body "$(cat <<'EOF'
## Automated docs sync

This PR was auto-generated by the [docs-sync workflow](https://github.com/cosmos/docs/blob/main/.github/workflows/docs-sync-to-example.yml) in **cosmos/docs**.

**Source commit:** ${{ github.sha }}
**Triggered by:** ${{ github.event.head_commit.message }}

### What changed
Transformed \`sdk/next/tutorials/example/*.mdx\` → \`docs/*.md\`:
- Stripped YAML frontmatter → \`# H1\` heading
- Rewrote relative paths → \`https://docs.cosmos.network/...\` links
- Renamed \`.mdx\` extensions → \`.md\`

### Review checklist
- [ ] Markdown renders correctly
- [ ] Cross-links between tutorial files work
- [ ] No Mintlify-specific MDX syntax leaked through

> **Do not edit \`docs/\` files directly in cosmos/example** unless you want the change synced back to the docs site. The canonical source of truth for content lives wherever the edit originates.

🤖 Generated by docs-sync bot
EOF
)"
          fi
